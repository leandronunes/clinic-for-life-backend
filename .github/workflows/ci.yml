name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager
      
      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit
      
  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic
          POSTGRES_DB: clinic_for_life_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U clinic"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_USERNAME: clinic
      DATABASE_PASSWORD: clinic
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up test database
        run: bin/rails db:test:prepare

      - name: Run test suite (fails below 90% line coverage)
        run: bundle exec rspec

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  pact_verify:
    name: Verify Pact contracts
    runs-on: ubuntu-latest
    # Independent of scan_ruby/lint/test: a Pact Broker outage or missing
    # secrets shouldn't block those unrelated checks. See docs/pact.md —
    # this job needs PACT_BROKER_BASE_URL/PACT_BROKER_TOKEN configured as
    # repo secrets to have anything to verify against once the frontend
    # starts publishing; until then it's expected to fail with "no pacts
    # found", which is why it's kept separate rather than gating merges.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic
          POSTGRES_DB: clinic_for_life_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U clinic"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_USERNAME: clinic
      DATABASE_PASSWORD: clinic
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
      PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
      PACT_PROVIDER_VERSION: ${{ github.sha }}
      PACT_PROVIDER_BRANCH: ${{ github.head_ref || github.ref_name }}
      PACT_PUBLISH_VERIFICATION_RESULTS: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up test database
        run: bin/rails db:test:prepare

      - name: Verify this API against the frontend's published pacts
        run: bundle exec rake pact:verify

