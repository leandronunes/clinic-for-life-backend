openapi: 3.0.3
info:
  title: Clinic for Life API
  version: v1
  description: |
    API do Clinic for Life — gestão de personal trainers, alunos, avaliações,
    treinos e evolução física. Todas as respostas de sucesso seguem o envelope
    `{ "data": ..., "meta"?: ... }`; erros seguem `{ "error": "..." }` ou
    `{ "error": ["..."] }` quando há múltiplas mensagens de validação.

    Autenticação via JWT Bearer token, obtido em `/api/v1/auth/login`,
    `/api/v1/auth/register` ou `/api/v1/auth/google`.
  contact:
    name: Clinic for Life
servers:
  - url: http://localhost:3002
    description: Desenvolvimento local

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Login, registro e sessão do usuário
  - name: Dashboard
    description: Indicadores agregados para admin/personal
  - name: Uploads
    description: URLs pré-assinadas para upload direto no S3
  - name: Organizations
    description: Organizações (multi-tenant) — listagem pública usada no cadastro
  - name: Trainers
    description: Personal trainers
  - name: Students
    description: Alunos
  - name: Anamnesis
    description: Anamnese do aluno
  - name: Structural Assessment
    description: Avaliação estrutural do aluno
  - name: Biomechanical Assessments
    description: Avaliação biomecânica (fotos posturais) do aluno
  - name: Evolution
    description: Evolução física (medições + fotos) do aluno
  - name: Bioimpedance Measurements
    description: Medições de bioimpedância do aluno
  - name: Bioimpedance Import
    description: Importação em lote de medições via CSV (InBody)
  - name: Workouts
    description: Treinos do aluno
  - name: Exercises
    description: Exercícios de um treino
  - name: CheckIns
    description: Check-in e validação de treino (assiduidade)
  - name: CompletedCheckIns
    description: >-
      Treinos concluídos do portfólio do personal/admin, para revisão e envio
      de feedback/reação
  - name: Feedbacks
    description: >-
      Feedback do personal (elogio/correção/incentivo) sobre um treino
      concluído específico
  - name: WorkoutReactions
    description: Reação de emoji do personal a um treino concluído
  - name: Exams
    description: Exames do aluno
  - name: Partners
    description: Parceiros exibidos na vitrine
  - name: Push Subscriptions
    description: Assinaturas de notificações push do navegador (VAPID)
  - name: Schedule
    description: >-
      Calendário de treinos dinâmico — planos recorrentes e as sessões
      agendadas geradas a partir deles

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Autentica um usuário por e-mail e senha
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200":
          description: Autenticado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Auto-registro de usuário
      operationId: registerUser
      description: >-
        Associa automaticamente a conta a um Trainer ou Student existente
        quando o e-mail informado já estiver cadastrado como personal/aluno
        (esse caminho ignora `role`/`trainer_mode`, se enviados). Quando
        nenhum Trainer casa com o e-mail: `role: "student"` cria um novo
        perfil de Student junto com a conta (toda conta "student" sempre
        termina com um `student_id` válido); `role: "personal"` cria um
        Trainer novo conforme `trainer_mode` — `"solo"` (organização
        privada própria, já aprovado; também o default se `trainer_mode`
        for omitido) ou `"create_org"` (organização nova com
        `organization_name`/`organization_domain`, já aprovada) fazem
        deste usuário o **admin** da organização recém-criada (a resposta
        traz `role: "admin"`, não `"personal"`, já que ele é quem a
        fundou); `"join"` (organização existente por `organization_id`)
        mantém `role: "personal"`, pendente de aprovação do admin dela —
        ver `pending_approval` na resposta.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
                password_confirmation: { type: string, format: password }
                role: { type: string, enum: [personal, student] }
                trainer_mode:
                  type: string
                  enum: [solo, join, create_org]
                  description: Só relevante quando `role` é `"personal"`.
                organization_id:
                  type: integer
                  description: Obrigatório quando `trainer_mode` é `"join"`.
                organization_name:
                  type: string
                  description: Obrigatório quando `trainer_mode` é `"create_org"`.
                organization_domain:
                  type: string
                  description: Obrigatório quando `trainer_mode` é `"create_org"`.
      responses:
        "201":
          description: Conta criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "404":
          description: "organization_id (trainer_mode: join) não encontrado"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/auth/google:
    post:
      tags: [Auth]
      summary: Autentica ou registra um usuário via token OAuth do Google
      operationId: googleAuth
      description: >-
        Cria a conta no primeiro acesso (retorna 201), aplicando a mesma lógica
        de associação a Trainer/Student do endpoint de registro. Em acessos
        seguintes retorna 200.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [access_token]
              properties:
                access_token: { type: string }
      responses:
        "200":
          description: Login efetuado (usuário já existia)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "201":
          description: Conta criada no primeiro acesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "401":
          description: Token do Google inválido
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Retorna o usuário autenticado
      operationId: getCurrentUser
      responses:
        "200":
          description: Usuário atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Auth]
      summary: Atualiza o nome/e-mail do usuário autenticado
      operationId: updateCurrentUser
      description: >-
        Qualquer papel autenticado pode atualizar o próprio nome/e-mail.
        `role` e as associações (`trainer_id`/`student_id`) não são
        aceitos por este endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
      responses:
        "200":
          description: Usuário atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/auth/password:
    patch:
      tags: [Auth]
      summary: Altera a senha do usuário autenticado
      operationId: updateCurrentUserPassword
      description: >-
        Qualquer papel autenticado pode alterar a própria senha, informando
        a senha atual para confirmação.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password, password_confirmation]
              properties:
                current_password: { type: string }
                password: { type: string }
                password_confirmation: { type: string }
      responses:
        "200":
          description: Senha atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Solicita um link de redefinição de senha por e-mail
      operationId: forgotPassword
      description: >-
        Sempre responde com a mesma mensagem genérica, exista ou não uma
        conta com o e-mail informado — evita revelar quais e-mails estão
        cadastrados. Só envia um e-mail (com um link válido por 30 minutos)
        quando a conta existe. Limitado a 5 requisições por minuto por IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Pedido registrado (mensagem genérica, independe do e-mail existir)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string }
        "429":
          description: Muitas requisições — limite de taxa excedido
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/auth/password/reset:
    post:
      tags: [Auth]
      summary: Redefine a senha a partir de um token de recuperação
      operationId: resetPassword
      description: >-
        Recebe o token bruto enviado por e-mail (ver
        `/auth/password/forgot`). Em caso de sucesso, invalida o token e
        autentica o usuário automaticamente (mesmo formato de resposta de
        `/auth/login`).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, password_confirmation]
              properties:
                token: { type: string }
                password: { type: string, format: password }
                password_confirmation: { type: string, format: password }
      responses:
        "200":
          description: Senha redefinida com sucesso — usuário autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "422":
          description: Token inválido/expirado, ou nova senha não atende aos requisitos
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/dashboard/kpis:
    get:
      tags: [Dashboard]
      summary: Cartões de indicadores do dashboard
      operationId: getDashboardKpis
      description: Requer papel `admin` ou `personal`.
      parameters:
        - $ref: "#/components/parameters/RangeParam"
      responses:
        "200":
          description: Lista de indicadores
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DashboardKpiCard" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/dashboard/activity:
    get:
      tags: [Dashboard]
      summary: Série temporal de atividade (treinos e avaliações)
      operationId: getDashboardActivity
      description: Requer papel `admin` ou `personal`.
      parameters:
        - $ref: "#/components/parameters/RangeParam"
      responses:
        "200":
          description: Série temporal
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DashboardActivityPoint" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/dashboard/attendance:
    get:
      tags: [Dashboard]
      summary: Resumo agregado de assiduidade (check-ins de treino)
      operationId: getDashboardAttendance
      description: Requer papel `admin` ou `personal`.
      parameters:
        - $ref: "#/components/parameters/RangeParam"
      responses:
        "200":
          description: Resumo de assiduidade
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AttendanceSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/completed_check_ins:
    get:
      tags: [CompletedCheckIns]
      summary: Lista os treinos concluídos do portfólio do personal/admin
      operationId: listCompletedCheckIns
      description: >-
        Requer papel `admin` ou `personal`. Não é escopado por aluno — um
        personal vê os check-ins concluídos de todos os seus alunos; um admin
        vê todos. Ordenado por `completed_at` decrescente.
      responses:
        "200":
          description: Check-ins concluídos mais recentes primeiro
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/WorkoutCheckIn" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/schedule_sessions:
    get:
      tags: [Schedule]
      summary: Lista sessões agendadas num intervalo de datas
      operationId: listScheduleSessions
      description: >-
        `from`/`to` são obrigatórios (YYYY-MM-DD, inclusive). Aluno vê só a
        própria agenda; personal vê só o próprio portfólio; admin vê tudo e
        pode filtrar por `trainer_id`/`student_id`.
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
        - name: trainer_id
          in: query
          required: false
          schema: { type: string }
          description: Só tem efeito para o papel admin
        - name: student_id
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Sessões ordenadas por starts_at crescente
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ScheduleSession" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: from ou to ausentes
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/schedule_sessions/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    patch:
      tags: [Schedule]
      summary: Atualiza uma sessão agendada
      operationId: updateScheduleSession
      description: Requer papel `admin` ou `personal` dono do aluno — aluno nunca edita a própria agenda.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                starts_at: { type: string, format: date-time }
                duration_minutes: { type: integer, minimum: 15, maximum: 240 }
                status: { $ref: "#/components/schemas/ScheduleSessionStatus" }
                notes: { type: string, nullable: true }
      responses:
        "200":
          description: Sessão atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ScheduleSession" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Schedule]
      summary: Cancela (remove) uma sessão agendada
      operationId: deleteScheduleSession
      description: Hard delete — requer papel `admin` ou `personal` dono do aluno.
      responses:
        "204":
          description: Sessão removida
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/schedule_plans:
    post:
      tags: [Schedule]
      summary: Cria um plano recorrente e expande em N sessões
      operationId: createSchedulePlan
      description: >-
        Requer papel `admin` ou `personal` dono do aluno. As sessões são
        geradas dia a dia entre `starts_on` e `ends_on` (inclusive) para cada
        dia da semana presente em `weekdays`, no horário local de
        America/Sao_Paulo.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SchedulePlanInput" }
      responses:
        "201":
          description: Plano criado e sessões geradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      created: { type: integer }
                      sessions:
                        type: array
                        items: { $ref: "#/components/schemas/ScheduleSession" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: >-
            weekdays vazio, ends_on antes de starts_on, intervalo maior que
            366 dias, ou duration_minutes fora de 15..240
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/uploads/presign:
    post:
      tags: [Uploads]
      summary: Gera uma URL pré-assinada do S3 para upload direto
      operationId: presignUpload
      description: >-
        O contexto `partner_logo` é restrito a admins; os demais contextos são
        autorizados em relação ao `student_id` informado (dono do aluno ou o
        próprio aluno, no caso de `exam`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_type, context]
              properties:
                filename: { type: string, description: "Informativo; não afeta a chave gerada no S3" }
                content_type:
                  type: string
                  description: MIME type do arquivo a ser enviado
                  enum:
                    - video/mp4
                    - video/webm
                    - video/quicktime
                    - video/x-msvideo
                    - video/mpeg
                    - video/ogg
                    - image/jpeg
                    - image/png
                    - image/webp
                    - image/heic
                    - image/heif
                    - application/pdf
                context:
                  type: string
                  enum: [exercise_video, evolution_photo, biomechanical_image, exam, partner_logo]
                student_id:
                  type: string
                  description: Obrigatório para todos os contextos exceto partner_logo
      responses:
        "200":
          description: URLs geradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      upload_url: { type: string, format: uri, description: "URL PUT pré-assinada, expira em S3_PRESIGN_EXPIRY segundos" }
                      public_url: { type: string, format: uri, description: "URL pública permanente do objeto" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          description: Storage não configurado (S3_BUCKET ausente)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/organizations:
    get:
      tags: [Organizations]
      summary: Lista organizações (id/name/domain)
      operationId: listOrganizations
      description: >-
        Público — usado pelo seletor "entrar numa organização existente" no
        cadastro, antes mesmo da conta existir. Não expõe nenhum dado
        sensível (sem contagem de membros, sem trainers/students). Exclui
        organizações privadas autogeradas para um personal que optou por
        atuar sozinho — não são organizações que outra pessoa poderia
        querer entrar.
      security: []
      responses:
        "200":
          description: Lista de organizações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Organization" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/organizations/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    patch:
      tags: [Organizations]
      summary: Atualiza a própria organização
      operationId: updateOrganization
      description: >-
        Requer papel `admin`. Só permite editar a organização à qual o
        próprio admin pertence — nenhum papel pode editar outra organização.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrganizationInput" }
      responses:
        "200":
          description: Organização atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Organization" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    put:
      tags: [Organizations]
      summary: Atualiza a própria organização (idêntico ao PATCH)
      operationId: replaceOrganization
      description: >-
        Requer papel `admin`. Só permite editar a organização à qual o
        próprio admin pertence — nenhum papel pode editar outra organização.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrganizationInput" }
      responses:
        "200":
          description: Organização atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Organization" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/trainers:
    get:
      tags: [Trainers]
      summary: Lista personal trainers
      operationId: listTrainers
      parameters:
        - name: status
          in: query
          schema: { type: string }
          description: >-
            Filtra por status. Aceita um valor único ("active") ou múltiplos
            separados por vírgula ("active,blocked"). Sem o parâmetro, retorna
            trainers de qualquer status.
        - name: pending
          in: query
          schema: { type: boolean }
          description: Quando `true`, retorna só trainers aguardando aprovação (`approved_at` nulo).
      responses:
        "200":
          description: Lista de trainers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TotalMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Trainer" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Trainers]
      summary: Cria um personal trainer
      operationId: createTrainer
      description: Requer papel `admin`.
