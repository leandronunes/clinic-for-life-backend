      summary: Registra uma medição de bioimpedância manual
      operationId: createBioimpedanceMeasurement
      description: Requer papel `admin` ou `personal`. Uma medição por dia por aluno.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BioimpedanceMeasurementInput" }
      responses:
        "201":
          description: Medição criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BioimpedanceMeasurement" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/students/{student_id}/bioimpedance_measurements/{id}:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/IdParam"
    delete:
      tags: [Bioimpedance Measurements]
      summary: Remove uma medição de bioimpedância
      operationId: deleteBioimpedanceMeasurement
      description: Requer papel `admin` ou `personal`.
      responses:
        "204":
          description: Removida com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/bioimpedance/import:
    post:
      tags: [Bioimpedance Import]
      summary: Importa medições de bioimpedância a partir de um CSV ou PDF do InBody/mynutri
      operationId: importBioimpedanceMeasurements
      description: >-
        Requer papel `admin` ou `personal` dono do aluno. Aceita o CSV exportado
        pelo InBody (uma ou mais medições) ou um relatório PDF do InBody gerado
        pela plataforma mynutri (extrai apenas a medição atual do relatório).
        O tipo de arquivo é detectado automaticamente pelo conteúdo enviado.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [student_id]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Arquivo CSV ou PDF exportado pelo InBody/mynutri (alternativo a `content`)"
                content:
                  type: string
                  description: "Conteúdo do CSV já lido como texto (alternativo a `file`; não aplicável a PDF)"
                student_id: { type: string }
                filename: { type: string }
      responses:
        "201":
          description: Resultado da importação
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      imported: { type: integer, description: "Quantidade de linhas importadas com sucesso" }
                      errors:
                        type: array
                        items: { type: string }
                        description: "Mensagens de erro por linha inválida"
                      preview:
                        type: array
                        items: { $ref: "#/components/schemas/BioimpedanceMeasurement" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Arquivo ausente, aluno não encontrado ou CSV/PDF inválido, vazio ou não reconhecido como InBody
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/students/{student_id}/workouts:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Workouts]
      summary: Lista os treinos do aluno
      operationId: listWorkouts
      description: >-
        Um aluno pode ter múltiplos treinos ativos simultaneamente; use o
        filtro `status` para separar ativos de arquivados.
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/WorkoutStatus" }
      responses:
        "200":
          description: Treinos ordenados por posição
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Workout" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Workouts]
      summary: Cria um treino (opcionalmente já com exercícios)
      operationId: createWorkout
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/WorkoutInput"
                - type: object
                  properties:
                    exercises:
                      type: array
                      items: { $ref: "#/components/schemas/ExerciseInput" }
      responses:
        "201":
          description: Treino criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Workout" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/students/{student_id}/workouts/reorder:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    patch:
      tags: [Workouts]
      summary: Reordena os treinos do aluno
      operationId: reorderWorkouts
