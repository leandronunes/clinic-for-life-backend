        "200":
          description: Treino atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Workout" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    put:
      tags: [Workouts]
      summary: Atualiza um treino (idêntico ao PATCH)
      operationId: replaceWorkout
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkoutInput" }
      responses:
        "200":
          description: Treino atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Workout" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/students/{student_id}/workouts/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [Workouts]
      summary: Arquiva um treino
      operationId: archiveWorkout
      description: Requer papel `admin` ou `personal`.
      responses:
        "200":
          description: Treino arquivado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Workout" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/workouts/{id}/unarchive:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [Workouts]
      summary: Reativa um treino arquivado
      operationId: unarchiveWorkout
      description: Requer papel `admin` ou `personal`.
      responses:
        "200":
          description: Treino reativado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Workout" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: O treino não está arquivado
