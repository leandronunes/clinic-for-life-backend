      operationId: importBioimpedanceMeasurements
      description: Requer papel `admin` ou `personal` dono do aluno.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [student_id]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Arquivo CSV exportado pelo InBody (alternativo a `content`)"
                content:
                  type: string
                  description: "Conteúdo do CSV já lido como texto (alternativo a `file`)"
                student_id: { type: string }
                filename: { type: string }
      responses:
        "201":
          description: Resultado da importação
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      imported: { type: integer, description: "Quantidade de linhas importadas com sucesso" }
