openapi: 3.0.3
info:
  title: Clinic for Life API
  version: v1
  description: |
    API do Clinic for Life — gestão de personal trainers, alunos, avaliações,
    treinos e evolução física. Todas as respostas de sucesso seguem o envelope
    `{ "data": ..., "meta"?: ... }`; erros seguem `{ "error": "..." }` ou
    `{ "error": ["..."] }` quando há múltiplas mensagens de validação.

    Autenticação via JWT Bearer token, obtido em `/api/v1/auth/login`,
    `/api/v1/auth/register` ou `/api/v1/auth/google`.
  contact:
    name: Clinic for Life
servers:
  - url: http://localhost:3002
    description: Desenvolvimento local

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Login, registro e sessão do usuário
  - name: Dashboard
    description: Indicadores agregados para admin/personal
  - name: Uploads
    description: URLs pré-assinadas para upload direto no S3
  - name: Trainers
    description: Personal trainers
  - name: Students
    description: Alunos
  - name: Anamnesis
    description: Anamnese do aluno
  - name: Structural Assessment
    description: Avaliação estrutural do aluno
  - name: Biomechanical Assessments
    description: Avaliação biomecânica (fotos posturais) do aluno
  - name: Evolution
    description: Evolução física (medições + fotos) do aluno
  - name: Bioimpedance Measurements
    description: Medições de bioimpedância do aluno
  - name: Bioimpedance Import
    description: Importação em lote de medições via CSV (InBody)
  - name: Workouts
    description: Treinos do aluno
  - name: Exercises
    description: Exercícios de um treino
  - name: Exams
    description: Exames do aluno
  - name: Partners
    description: Parceiros exibidos na vitrine

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Autentica um usuário por e-mail e senha
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200":
          description: Autenticado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Auto-registro de usuário
      operationId: registerUser
      description: >-
        Associa automaticamente a conta a um Trainer ou Student existente
        quando o e-mail informado já estiver cadastrado como personal/aluno.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
                password_confirmation: { type: string, format: password }
      responses:
        "201":
          description: Conta criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/auth/google:
    post:
      tags: [Auth]
      summary: Autentica ou registra um usuário via token OAuth do Google
      operationId: googleAuth
      description: >-
        Cria a conta no primeiro acesso (retorna 201), aplicando a mesma lógica
        de associação a Trainer/Student do endpoint de registro. Em acessos
        seguintes retorna 200.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [access_token]
              properties:
                access_token: { type: string }
      responses:
        "200":
          description: Login efetuado (usuário já existia)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "201":
          description: Conta criada no primeiro acesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SessionPayload" }
        "401":
          description: Token do Google inválido
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Retorna o usuário autenticado
      operationId: getCurrentUser
      responses:
        "200":
          description: Usuário atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/dashboard/kpis:
    get:
      tags: [Dashboard]
      summary: Cartões de indicadores do dashboard
      operationId: getDashboardKpis
      description: Requer papel `admin` ou `personal`.
      parameters:
        - $ref: "#/components/parameters/RangeParam"
      responses:
        "200":
          description: Lista de indicadores
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DashboardKpiCard" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/dashboard/activity:
    get:
      tags: [Dashboard]
      summary: Série temporal de atividade (treinos e avaliações)
      operationId: getDashboardActivity
      description: Requer papel `admin` ou `personal`.
      parameters:
        - $ref: "#/components/parameters/RangeParam"
      responses:
        "200":
          description: Série temporal
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DashboardActivityPoint" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/uploads/presign:
    post:
      tags: [Uploads]
      summary: Gera uma URL pré-assinada do S3 para upload direto
      operationId: presignUpload
      description: >-
        O contexto `partner_logo` é restrito a admins; os demais contextos são
        autorizados em relação ao `student_id` informado (dono do aluno ou o
        próprio aluno, no caso de `exam`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_type, context]
              properties:
                filename: { type: string, description: "Informativo; não afeta a chave gerada no S3" }
                content_type:
                  type: string
                  description: MIME type do arquivo a ser enviado
                  enum:
                    - video/mp4
                    - video/webm
                    - video/quicktime
                    - video/x-msvideo
                    - video/mpeg
                    - video/ogg
                    - image/jpeg
                    - image/png
                    - image/webp
                    - image/heic
                    - image/heif
                    - application/pdf
                context:
                  type: string
                  enum: [exercise_video, evolution_photo, biomechanical_image, exam, partner_logo]
                student_id:
                  type: string
                  description: Obrigatório para todos os contextos exceto partner_logo
      responses:
        "200":
          description: URLs geradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      upload_url: { type: string, format: uri, description: "URL PUT pré-assinada, expira em S3_PRESIGN_EXPIRY segundos" }
                      public_url: { type: string, format: uri, description: "URL pública permanente do objeto" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          description: Storage não configurado (S3_BUCKET ausente)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/trainers:
    get:
      tags: [Trainers]
      summary: Lista personal trainers
      operationId: listTrainers
      responses:
        "200":
          description: Lista de trainers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TotalMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Trainer" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Trainers]
      summary: Cria um personal trainer
      operationId: createTrainer
      description: Requer papel `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrainerInput" }
      responses:
        "201":
          description: Trainer criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Trainer" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/trainers/search:
    get:
      tags: [Trainers]
      summary: Busca rápida de trainers ativos (autocomplete)
      operationId: searchTrainers
      parameters:
        - name: query
          in: query
          schema: { type: string }
          description: Filtra por nome, CREF ou e-mail (case-insensitive)
      responses:
        "200":
          description: Até 8 resultados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Trainer" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/trainers/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Trainers]
      summary: Exibe um personal trainer
      operationId: getTrainer
      responses:
        "200":
          description: Trainer encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Trainer" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Trainers]
      summary: Atualiza um personal trainer
      operationId: updateTrainer
      description: Requer papel `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrainerInput" }
      responses:
        "200":
          description: Trainer atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Trainer" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    put:
      tags: [Trainers]
      summary: Atualiza um personal trainer (idêntico ao PATCH)
      operationId: replaceTrainer
      description: Requer papel `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrainerInput" }
      responses:
        "200":
          description: Trainer atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Trainer" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [Trainers]
      summary: Remove um personal trainer
      operationId: deleteTrainer
      description: Requer papel `admin`.
      responses:
        "204":
          description: Removido com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students:
    get:
      tags: [Students]
      summary: Lista alunos
      operationId: listStudents
      description: >-
        Personal vê apenas seus alunos (`trainer_id`); aluno vê apenas o
        próprio registro; admin vê todos.
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [active, inactive] }
        - name: query
          in: query
          schema: { type: string }
          description: Filtra por nome ou e-mail (case-insensitive)
      responses:
        "200":
          description: Lista de alunos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TotalMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Student" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Students]
      summary: Cria um aluno
      operationId: createStudent
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudentInput" }
      responses:
        "201":
          description: Aluno criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Student" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/students/{student_id}:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Students]
      summary: Exibe um aluno
      operationId: getStudent
      responses:
        "200":
          description: Aluno encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Student" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Students]
      summary: Atualiza um aluno
      operationId: updateStudent
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudentInput" }
      responses:
        "200":
          description: Aluno atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Student" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    put:
      tags: [Students]
      summary: Atualiza um aluno (idêntico ao PATCH)
      operationId: replaceStudent
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudentInput" }
      responses:
        "200":
          description: Aluno atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Student" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [Students]
      summary: Remove um aluno
      operationId: deleteStudent
      description: Requer papel `admin`.
      responses:
        "204":
          description: Removido com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/anamnesis:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Anamnesis]
      summary: Exibe a anamnese do aluno
      operationId: getAnamnesis
      description: Cria um registro em branco se ainda não existir.
      responses:
        "200":
          description: Anamnese do aluno
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Anamnesis" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Anamnesis]
      summary: Atualiza a anamnese do aluno
      operationId: updateAnamnesis
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnamnesisInput" }
      responses:
        "200":
          description: Anamnese atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Anamnesis" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    put:
      tags: [Anamnesis]
      summary: Atualiza a anamnese do aluno (idêntico ao PATCH)
      operationId: replaceAnamnesis
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnamnesisInput" }
      responses:
        "200":
          description: Anamnese atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Anamnesis" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/students/{student_id}/structural_assessment:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Structural Assessment]
      summary: Exibe a avaliação estrutural do aluno
      operationId: getStructuralAssessment
      description: Cria um registro em branco se ainda não existir.
      responses:
        "200":
          description: Avaliação estrutural
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/StructuralAssessment" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Structural Assessment]
      summary: Atualiza a avaliação estrutural do aluno
      operationId: updateStructuralAssessment
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StructuralAssessment" }
      responses:
        "200":
          description: Avaliação atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/StructuralAssessment" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    put:
      tags: [Structural Assessment]
      summary: Atualiza a avaliação estrutural do aluno (idêntico ao PATCH)
      operationId: replaceStructuralAssessment
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StructuralAssessment" }
      responses:
        "200":
          description: Avaliação atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/StructuralAssessment" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/students/{student_id}/biomechanical_assessments:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Biomechanical Assessments]
      summary: Lista o histórico de avaliações biomecânicas do aluno
      operationId: listBiomechanicalAssessments
      responses:
        "200":
          description: Lista de avaliações (mais recente primeiro)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/BiomechanicalAssessment" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/biomechanical_assessments/current:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Biomechanical Assessments]
      summary: Exibe a avaliação biomecânica mais recente do aluno
      operationId: getCurrentBiomechanicalAssessment
      description: Cria uma avaliação em branco se ainda não existir nenhuma.
      responses:
        "200":
          description: Avaliação biomecânica atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BiomechanicalAssessment" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/biomechanical_assessments/new_assessment:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    post:
      tags: [Biomechanical Assessments]
      summary: Cria uma nova avaliação biomecânica (sem imagens)
      operationId: createBiomechanicalAssessment
      description: Requer papel `admin` ou `personal`.
      responses:
        "201":
          description: Avaliação criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BiomechanicalAssessment" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/biomechanical_assessments/upload:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    put:
      tags: [Biomechanical Assessments]
      summary: Anexa/substitui a imagem de um slot na avaliação atual
      operationId: uploadBiomechanicalImage
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slot, image_url]
              properties:
