      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ordered_ids]
              properties:
                ordered_ids:
                  type: array
                  items: { type: string }
                  description: IDs dos treinos na nova ordem desejada
      responses:
        "200":
          description: Treinos reordenados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Workout" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/workouts/{id}:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/IdParam"
    patch:
      tags: [Workouts]
