            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/students/{student_id}/workouts/{workout_id}/exercises:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
    post:
      tags: [Exercises]
      summary: Adiciona um exercício ao treino
      operationId: createExercise
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExerciseInput" }
      responses:
        "201":
          description: Exercício criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Exercise" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/students/{student_id}/workouts/{workout_id}/exercises/reorder:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
    patch:
      tags: [Exercises]
      summary: Reordena os exercícios do treino
      operationId: reorderExercises
      description: Requer papel `admin` ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ordered_ids]
              properties:
                ordered_ids:
                  type: array
                  items: { type: string }
                  description: IDs dos exercícios na nova ordem desejada
      responses:
        "200":
          description: Exercícios reordenados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Exercise" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/workouts/{workout_id}/exercises/{id}:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
      - $ref: "#/components/parameters/IdParam"
    patch:
      tags: [Exercises]
      summary: Atualiza um exercício
      operationId: updateExercise
      description: >-
        Admin e personal (dono do aluno) podem alterar qualquer campo. O
        próprio aluno também pode enviar esta requisição, mas apenas
        `load_kg` é aplicado — os demais campos do payload são ignorados
        silenciosamente (usado na tela de execução para registrar a carga
        realmente usada).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExerciseInput" }
      responses:
        "200":
          description: Exercício atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Exercise" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    put:
      tags: [Exercises]
      summary: Atualiza um exercício (idêntico ao PATCH)
      operationId: replaceExercise
      description: >-
        Idêntico ao PATCH — inclusive quanto ao aluno só poder alterar
        `load_kg`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExerciseInput" }
      responses:
        "200":
          description: Exercício atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Exercise" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [Exercises]
      summary: Remove um exercício
      operationId: deleteExercise
      description: Requer papel `admin` ou `personal`.
      responses:
        "204":
          description: Removido com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
    post:
      tags: [CheckIns]
      summary: 'Inicia um check-in ("Iniciar treino")'
      operationId: startCheckIn
      description: >-
        Idempotente por natureza dos dados: só existe um check-in em
        andamento por treino por vez (garantido por índice único no banco).
        Também não permite iniciar um novo check-in se este treino já foi
        concluído hoje — remova o check-in existente primeiro (DELETE
        .../check_ins/{id}) para refazê-lo no mesmo dia.
      responses:
        "201":
          description: Check-in iniciado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/WorkoutCheckIn" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: >-
            Treino arquivado, já existe um check-in em andamento, ou este
            treino já foi concluído hoje
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins/{id}:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
      - $ref: "#/components/parameters/IdParam"
    delete:
      tags: [CheckIns]
      summary: Remove um check-in (concluído ou em andamento)
      operationId: deleteCheckIn
      description: >-
        O próprio aluno pode remover seu check-in (ex.: iniciado por engano),
        além de admin e do personal dono do aluno. Cascata: apaga também os
        exercícios marcados e o feedback associados a este check-in. Exceção:
        uma vez que o personal tenha confirmado o check-in
        (`personal_confirmed_at` presente, ver `/confirm`), ele conta no
        ciclo de atendimento do personal e o aluno não pode mais removê-lo —
        somente admin ou o personal dono do aluno.
      responses:
        "204":
          description: Removido com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins/current:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
    get:
      tags: [CheckIns]
      summary: Check-in "atual" deste treino — em andamento, ou concluído hoje
      operationId: getCurrentCheckIn
      description: >-
        Retorna o check-in em andamento, se houver; senão, o check-in
        concluído hoje (se houver); senão, `data: null`. Um check-in
        concluído em um dia anterior nunca é retornado aqui.
      responses:
        "200":
          description: "Check-in em andamento ou concluído hoje, ou `data: null` se não houver nenhum"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/WorkoutCheckIn"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins/{id}/finish:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [CheckIns]
      summary: 'Finaliza um check-in ("Finalizar treino")'
      operationId: finishCheckIn
      description: Manual — permite conclusão parcial (nem todo exercício precisa estar marcado).
      responses:
        "200":
          description: Check-in finalizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/WorkoutCheckIn" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Check-in já finalizado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins/{id}/confirm:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [CheckIns]
      summary: Confirma o próprio lado do chamador (aluno ou personal)
      operationId: confirmCheckIn
      description: >-
        Confirma o lado de quem chama: o aluno confirma `student_confirmed_at`
        (admin/personal não podem fazer isso por ele); staff (admin ou o
        personal dono do aluno) confirma `personal_confirmed_at` (o aluno não
        pode fazer isso por si mesmo). O check-in só passa a contar no ciclo
        de atendimento do personal quando AMBOS os lados estiverem
        confirmados. Idempotente — confirmar um lado já confirmado apenas
        reafirma, sem alterar o timestamp original.
      responses:
        "200":
          description: Check-in com o lado do chamador confirmado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/WorkoutCheckIn" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins/{id}/view:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [CheckIns]
      summary: Marca um check-in como visualizado pelo personal/admin
      operationId: viewCheckIn
      description: Idempotente — chamar novamente não altera `viewed_at`.
      responses:
        "200":
          description: Check-in marcado como visualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/WorkoutCheckIn" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins/{check_in_id}/reaction:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
      - name: check_in_id
        in: path
        required: true
        schema: { type: string }
        description: ID do check-in
    post:
      tags: [WorkoutReactions]
      summary: Reage com um emoji a um treino concluído
      operationId: createWorkoutReaction
      description: >-
        Upsert: reagir novamente substitui a reação anterior do mesmo autor
        neste check-in em vez de acumular duplicatas. Requer papel `admin`
        ou `personal`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji: { type: string }
      responses:
        "201":
          description: Reação registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/WorkoutReaction" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Só é possível reagir a um treino concluído
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins/{id}/exercises/{exercise_id}:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
      - $ref: "#/components/parameters/IdParam"
      - name: exercise_id
        in: path
        required: true
        schema: { type: string }
        description: ID do exercício
    patch:
      tags: [CheckIns]
      summary: Marca ou desmarca um exercício como concluído
      operationId: toggleCheckInExercise
      description: >-
        Ao marcar o último exercício pendente, o check-in é finalizado
        automaticamente (mesmo efeito de `finish`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [completed]
              properties:
                completed: { type: boolean }
      responses:
        "200":
          description: Check-in atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/WorkoutCheckIn" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Check-in já finalizado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/students/{student_id}/workouts/{workout_id}/check_ins/{id}/pse:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/WorkoutIdParam"
      - $ref: "#/components/parameters/IdParam"
    patch:
      tags: [CheckIns]
      summary: Registra a Percepção Subjetiva de Esforço (PSE) do check-in
      operationId: updateCheckInPse
      description: >-
        Só pode ser chamado com o check-in já concluído. Permite re-envio
        (idempotente por natureza — não há trava de "já definido").
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pse]
              properties:
                pse: { type: integer, minimum: 1, maximum: 10 }
      responses:
        "200":
          description: PSE registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/WorkoutCheckIn" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Check-in ainda em andamento, PSE ausente, ou fora de 1-10
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/students/{student_id}/check_ins:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [CheckIns]
      summary: Histórico de check-ins do aluno (todos os treinos)
      operationId: listCheckInHistory
      responses:
        "200":
          description: Check-ins mais recentes primeiro
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/WorkoutCheckIn" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/students/{student_id}/feedbacks:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Feedbacks]
      summary: Lista os recados (elogio/correção/incentivo) recebidos pelo aluno
      operationId: listFeedbacks
      responses:
        "200":
          description: Recados mais recentes primeiro
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Feedback" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Feedbacks]
      summary: Envia feedback sobre um treino concluído do aluno
      operationId: createFeedback
      description: >-
        Requer papel `admin` ou `personal`. O check-in referenciado precisa
        pertencer a este aluno e estar `completed`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workout_check_in_id, message]
              properties:
                workout_check_in_id: { type: string }
                message: { type: string, maxLength: 500 }
      responses:
        "201":
          description: Feedback enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Feedback" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Check-in não encontrado para este aluno
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Kind inválido, mensagem em branco/muito longa, ou check-in ainda não concluído
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/students/{student_id}/exams:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Exams]
      summary: Lista os exames do aluno
      operationId: listExams
      responses:
        "200":
          description: Exames ordenados por data de upload (mais recente primeiro)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Exam" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Exams]
      summary: Registra um exame já enviado ao S3
      operationId: createExam
      responses:
        "201":
          description: Exame criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Exam" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExamInput" }

  /api/v1/students/{student_id}/exams/{id}:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
      - $ref: "#/components/parameters/IdParam"
    delete:
      tags: [Exams]
      summary: Remove um exame
      operationId: deleteExam
      responses:
        "204":
          description: Removido com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/partners:
    get:
      tags: [Partners]
      summary: Lista parceiros
      operationId: listPartners
      parameters:
        - name: category
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Parceiros ordenados por categoria e nome
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Partner" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Partners]
      summary: Cria um parceiro
      operationId: createPartner
      description: Requer papel `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerInput" }
      responses:
        "201":
          description: Parceiro criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Partner" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/partners/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    patch:
      tags: [Partners]
      summary: Atualiza um parceiro
      operationId: updatePartner
      description: Requer papel `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerInput" }
      responses:
        "200":
          description: Parceiro atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Partner" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    put:
      tags: [Partners]
      summary: Atualiza um parceiro (idêntico ao PATCH)
      operationId: replacePartner
      description: Requer papel `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerInput" }
      responses:
        "200":
          description: Parceiro atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Partner" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [Partners]
      summary: Remove um parceiro
      operationId: deletePartner
      description: Requer papel `admin`.
      responses:
        "204":
          description: Removido com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/push_subscriptions:
    post:
      tags: [Push Subscriptions]
      summary: Registra (ou atualiza) a assinatura de push do navegador atual
      operationId: createPushSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushSubscriptionInput" }
      responses:
        "201":
          description: Assinatura registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/PushSubscription" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [Push Subscriptions]
      summary: Remove a assinatura de push identificada pelo endpoint informado
      operationId: deletePushSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint]
              properties:
                endpoint: { type: string, format: uri }
      responses:
        "204":
          description: Removida (ou já inexistente) com sucesso
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/chat/conversations:
    get:
      tags: [Chat]
      summary: Lista as conversas visíveis para o usuário atual
      operationId: listChatConversations
      description: >-
        Conversa 1:1 identificada pelo student_id. aluno vê no máximo a
        própria conversa; personal vê uma entrada por aluno ativo sob sua
        responsabilidade (mesmo sem mensagens ainda); admin vê todas.
        Ordenadas pela mensagem mais recente primeiro.
      responses:
        "200":
          description: Lista de conversas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ChatConversation" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/chat/conversations/{student_id}/messages:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    get:
      tags: [Chat]
      summary: Lista o histórico de mensagens da conversa, do mais antigo pro mais novo
      operationId: listChatMessages
      responses:
        "200":
          description: Lista de mensagens
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ChatMessage" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Chat]
      summary: Envia uma mensagem na conversa
      operationId: createChatMessage
      description: >-
        sender_id/sender_role são sempre derivados do usuário autenticado —
        qualquer valor enviado pelo cliente para esses campos é ignorado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 4000 }
      responses:
        "201":
          description: Mensagem criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ChatMessage" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/chat/conversations/{student_id}/read:
    parameters:
      - $ref: "#/components/parameters/StudentIdParam"
    post:
      tags: [Chat]
      summary: Marca como lidas as mensagens do outro lado da conversa
      operationId: markChatConversationRead
      description: >-
        Sempre responde 200, mesmo quando não havia nada pendente — o
        cliente chama de forma best-effort sempre que abre/atualiza a
        conversa.
      responses:
        "200":
          description: Contagem de mensagens marcadas como lidas nesta chamada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      read: { type: integer }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token obtido em /api/v1/auth/login, /auth/register ou /auth/google

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: ID do recurso
    StudentIdParam:
      name: student_id
      in: path
      required: true
      schema: { type: string }
      description: ID do aluno
    WorkoutIdParam:
      name: workout_id
      in: path
      required: true
      schema: { type: string }
      description: ID do treino
    RangeParam:
      name: range
      in: query
      schema: { type: string, enum: [day, week, year], default: month }
      description: >-
        Janela do agregado: day (1 dia), week (7 dias), year (365 dias).
        Qualquer outro valor (ou ausente) usa 30 dias.

  responses:
    Unauthorized:
      description: Token ausente, inválido ou expirado
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Usuário autenticado sem permissão para a ação
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    UnprocessableEntity:
      description: Falha de validação
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      properties:
        error:
          description: Mensagem única ou lista de mensagens de validação
          oneOf:
            - type: string
            - type: array
              items: { type: string }

    TotalMeta:
      type: object
      properties:
        meta:
          type: object
          properties:
            total: { type: integer }

    UserRole:
      type: string
      enum: [admin, personal, student]

    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        role: { $ref: "#/components/schemas/UserRole" }
        avatar_url: { type: string, format: uri, nullable: true }
        trainer_id: { type: string, nullable: true }
        student_id: { type: string, nullable: true }
        organization_id: { type: string, nullable: true }
        organization_solo:
          type: boolean
          description: >-
            true quando a organização deste usuário foi autogerada para um
            personal atuando sozinho (ver Organization#solo) — o frontend
            usa isso para esconder a gestão de organização (menu e rota)
            desse admin, já que não é uma organização "de verdade".
        mfa_enabled: { type: boolean }
        pending_approval:
          type: boolean
          description: >-
            true quando este usuário é um personal cujo pedido de entrada
            numa organização existente ainda não foi aprovado pelo admin
            dela — nesse estado, a maioria dos endpoints retorna 403 (ver
            /api/v1/trainers/{id}/approve).

    Organization:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        domain: { type: string }

    OrganizationInput:
      type: object
      properties:
        name: { type: string }
        domain:
          type: string
          description: Identificador cosmético (slug), ex. "clinica-vitalidade".

    SessionPayload:
      type: object
      properties:
        token: { type: string, description: "JWT a ser enviado em Authorization: Bearer <token>" }
        user: { $ref: "#/components/schemas/User" }
        expires_at: { type: string, format: date-time }

    TrainerStatus:
      type: string
      enum: [active, blocked, inactive]

    Trainer:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        cpf: { type: string, nullable: true }
        cref: { type: string, nullable: true }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/TrainerStatus" }
        avatar_url: { type: string, format: uri, nullable: true }
        students_count: { type: integer }
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            Presente quando o trainer já foi aprovado (sempre presente pra
            trainers criados diretamente por um admin ou autocadastrados como
            solo/criando organização; nulo enquanto aguarda aprovação do admin
            da organização que pediu pra entrar).

    TrainerInput:
      type: object
      required: [name, email, status]
      properties:
        name: { type: string }
        cpf: { type: string, nullable: true }
        cref: { type: string, nullable: true }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/TrainerStatus" }
        avatar_url: { type: string, format: uri, nullable: true }

    StudentSex:
      type: string
      enum: [female, male, other]

    StudentStatus:
      type: string
      enum: [active, inactive]

    Student:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        birth_date: { type: string, format: date, nullable: true }
        sex: { $ref: "#/components/schemas/StudentSex" }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        trainer_id: { type: string, nullable: true }
        trainer_name: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/StudentStatus" }
        partner_card_enabled:
          type: boolean
          description: >-
            Se o aluno tem acesso ao cartão de desconto de parceiros. Padrão
            true na criação; somente um admin pode alterar.
        health_plan: { type: string, nullable: true }
        emergency_contact: { type: string, nullable: true }
        contracted_workouts_per_cycle:
          type: integer
          nullable: true
          description: >-
            Treinos contratados por ciclo. Null quando o aluno não tem
            contrato de quota definido. Somente admin e personal podem alterar.
        cycle_started_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            Início do ciclo de assiduidade atual, usado para contar os
            treinos concluídos dentro do ciclo. Somente admin e personal
            podem alterar — via PATCH direto (ex.: ao mudar a quota) ou via
            POST /students/{id}/renew_cycle, que além de reiniciar o ciclo
            arquiva o anterior em AttendanceCycle.
        created_at: { type: string, format: date-time }

    StudentInput:
      type: object
      required: [name, email, sex, status]
      properties:
        name: { type: string }
        birth_date: { type: string, format: date, nullable: true }
        sex: { $ref: "#/components/schemas/StudentSex" }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        trainer_id:
          type: string
          nullable: true
          description: >-
            Opcional quando quem cria é um personal (usa o próprio trainer_id
            automaticamente)
        status: { $ref: "#/components/schemas/StudentStatus" }
        partner_card_enabled:
          type: boolean
          description: "Somente um admin pode definir este campo; ignorado para os demais papéis."
        health_plan: { type: string, nullable: true }
        emergency_contact: { type: string, nullable: true }
        contracted_workouts_per_cycle:
          type: integer
          nullable: true
          description: >-
            Treinos contratados por ciclo. Somente admin e personal podem
            definir este campo; ignorado para os demais papéis.
        cycle_started_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            Início do ciclo de assiduidade atual. Somente admin e personal
            podem definir este campo; ignorado para os demais papéis. Prefira
            POST /students/{id}/renew_cycle para reiniciar o ciclo mantendo
            o anterior arquivado em AttendanceCycle.

    AttendanceCycle:
      type: object
      description: >-
        Um ciclo de assiduidade já encerrado (arquivado ao chamar
        POST /students/{id}/renew_cycle).
      properties:
        id: { type: string }
        student_id: { type: string }
        contracted_workouts_per_cycle:
          type: integer
          description: Quota vigente durante este ciclo (snapshot no momento do arquivamento).
        completed_workouts:
          type: integer
          description: Treinos concluídos com completed_at dentro de [started_at, ended_at].
        percentage:
          type: integer
          description: completed_workouts / contracted_workouts_per_cycle, arredondado.
        status:
          type: string
          enum: [completed, exceeded]
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }

    ExternalProfessional:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        specialty: { type: string, nullable: true }
        objective: { type: string, nullable: true }

    Anamnesis:
      type: object
      description: >-
        Todos os campos clínicos são opcionais; ausentes retornam `null`.
      properties:
        id: { type: string }
        student_id: { type: string }
        objectives: { type: string, nullable: true }
        medicines: { type: string, nullable: true }
        supplements: { type: string, nullable: true }
        systolic_pressure: { type: number, nullable: true }
        diastolic_pressure: { type: number, nullable: true }
        variable_glycemia: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        height: { type: number, nullable: true, description: "cm" }
        weight: { type: number, nullable: true, description: "kg" }
        fracture: { type: string, nullable: true }
        dislocations: { type: string, nullable: true }
        pain: { type: string, nullable: true }
        orthopedic_notes: { type: string, nullable: true }
        meals: { type: string, nullable: true }
        hydration: { type: string, nullable: true }
        sleep: { type: string, nullable: true }
        stool: { type: string, nullable: true }
        urine: { type: string, nullable: true }
        external_professionals:
          type: array
          items: { $ref: "#/components/schemas/ExternalProfessional" }

    AnamnesisInput:
      type: object
      description: >-
        Envie apenas os campos que deseja alterar; todos são opcionais.
        Para substituir os profissionais externos, envie `external_professionals`
        completo — a lista anterior é descartada e recriada a partir do payload.
      properties:
        objectives: { type: string, nullable: true }
        medicines: { type: string, nullable: true }
        supplements: { type: string, nullable: true }
        systolic_pressure: { type: number, nullable: true }
        diastolic_pressure: { type: number, nullable: true }
        variable_glycemia: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        height: { type: number, nullable: true }
        weight: { type: number, nullable: true }
        fracture: { type: string, nullable: true }
        dislocations: { type: string, nullable: true }
        pain: { type: string, nullable: true }
        orthopedic_notes: { type: string, nullable: true }
        meals: { type: string, nullable: true }
        hydration: { type: string, nullable: true }
        sleep: { type: string, nullable: true }
        stool: { type: string, nullable: true }
        urine: { type: string, nullable: true }
        external_professionals:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              specialty: { type: string, nullable: true }
              objective: { type: string, nullable: true }

    StructuralAssessment:
      type: object
      description: >-
        Achados estruturais booleanos (true = presente). Os mesmos 13 campos
        são usados tanto na resposta quanto no corpo de atualização.
      properties:
        scoliosis: { type: boolean }
        spine_rotation: { type: boolean }
        hip_rotation: { type: boolean }
        scapular_girdle_imbalance: { type: boolean }
        scapular_dyskinesis: { type: boolean }
        shortening: { type: boolean }
        limb_length_difference: { type: boolean }
        pelvic_anteversion: { type: boolean }
        pelvic_retroversion: { type: boolean }
        knee_valgus: { type: boolean }
        knee_varus: { type: boolean }
        cavus_foot_arch: { type: boolean }
        flat_foot_arch: { type: boolean }

    BiomechanicalSlot:
      type: string
      enum: [frontal, posterior, trunk_flexion, left_side, right_side, profile_flexion]

    BiomechanicalAssessment:
      type: object
      properties:
        id: { type: string }
        created_at: { type: string, format: date-time }
        images:
          type: object
          description: >-
            Mapa slot → URL da imagem (apenas slots preenchidos). Uploads
            para o bucket S3 vêm como URL assinada de curta duração
            (expira — ver S3_GET_PRESIGN_EXPIRY); busque o recurso de novo
            para renovar.
          additionalProperties: { type: string, format: uri }

    BioimpedanceMeasurement:
      type: object
      properties:
        id: { type: string }
        student_id: { type: string }
        measured_on: { type: string, format: date }
        weight_kg: { type: number }
        muscle_mass_kg: { type: number, nullable: true }
        fat_percentage: { type: number, nullable: true }
        visceral_fat: { type: number, nullable: true }
        bmi: { type: number, nullable: true }
        source:
          type: string
          description: "Origem da medição: manual, import (CSV) ou InBody (padrão do banco)"
        photo_id: { type: string, nullable: true }
        photo_url:
          type: string
          format: uri
          nullable: true
          description: >-
            URL assinada de curta duração para uploads no bucket S3 (expira
            — ver S3_GET_PRESIGN_EXPIRY); busque o recurso de novo para
            renovar.

    BioimpedanceMeasurementInput:
      type: object
      required: [weight_kg, measured_on]
      properties:
        weight_kg: { type: number, minimum: 0, exclusiveMinimum: true }
        muscle_mass_kg: { type: number, nullable: true }
        fat_percentage: { type: number, nullable: true, minimum: 0, maximum: 75 }
        visceral_fat: { type: number, nullable: true }
        bmi: { type: number, nullable: true }
        measured_on:
          type: string
          format: date
          description: "Não pode ser uma data futura; única por aluno"
        source: { type: string, description: "Padrão: manual" }

    EvolutionPhoto:
      type: object
      properties:
        id: { type: string }
        measurement_id: { type: string, nullable: true }
        taken_on: { type: string, format: date }
        image_url:
          type: string
          format: uri
          description: >-
            URL assinada de curta duração para uploads no bucket S3 (expira
            — ver S3_GET_PRESIGN_EXPIRY); busque o recurso de novo para
            renovar.

    WorkoutStatus:
      type: string
      enum: [active, archived]

    Workout:
      type: object
      properties:
        id: { type: string }
        position: { type: integer }
        title: { type: string }
        focus: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/WorkoutStatus" }
        created_at: { type: string, format: date }
        archived_at: { type: string, format: date, nullable: true }
        exercises:
          type: array
          items: { $ref: "#/components/schemas/Exercise" }

    WorkoutInput:
      type: object
      required: [title]
      properties:
        title: { type: string }
        focus: { type: string, nullable: true }
        status:
          $ref: "#/components/schemas/WorkoutStatus"
        position:
          type: integer
          description: "Opcional; se omitido, é calculado automaticamente (último + 1)"

    Exercise:
      type: object
      properties:
        id: { type: string }
        position: { type: integer }
        name: { type: string }
        sets: { type: integer }
        reps: { type: string, nullable: true, description: "Texto livre, ex.: '8-12'" }
        load_kg: { type: number, nullable: true }
        rest_seconds: { type: integer }
        muscle_group: { type: string, nullable: true }
        video_url:
          type: string
          format: uri
          nullable: true
          description: >-
            Link do YouTube ou, para uploads no bucket S3, uma URL assinada
            de curta duração (expira — ver S3_GET_PRESIGN_EXPIRY); busque o
            recurso de novo para renovar.
        notes: { type: string, nullable: true }

    ExerciseInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        sets: { type: integer, minimum: 1 }
        reps: { type: string, nullable: true }
        load_kg: { type: number, nullable: true }
        rest_seconds: { type: integer, minimum: 0 }
        muscle_group: { type: string, nullable: true }
        video_url: { type: string, format: uri, nullable: true }
        notes: { type: string, nullable: true }
        position:
          type: integer
          description: "Opcional; se omitido, é calculado automaticamente"

    WorkoutCheckInStatus:
      type: string
      enum: [in_progress, completed]

    WorkoutCheckIn:
      type: object
      properties:
        id: { type: string }
        workout_id: { type: string }
        workout_title: { type: string }
        student_id: { type: string }
        student_name: { type: string }
        status: { $ref: "#/components/schemas/WorkoutCheckInStatus" }
        student_confirmed_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            Preenchido quando o aluno confirma o próprio lado (auto-preenchido
            se foi o aluno quem criou o check-in, ou via POST
            .../check_ins/{id}/confirm).
        personal_confirmed_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            Preenchido quando staff (admin/personal) confirma o lado do
            personal (auto-preenchido se foi staff quem criou o check-in, ou
            via POST .../check_ins/{id}/confirm). Só conta no ciclo de
            atendimento do personal (ver AttendanceCycle) quando AMBOS
            student_confirmed_at e personal_confirmed_at estiverem presentes.
        exercises_completed: { type: integer }
        exercises_total: { type: integer }
        completed_exercise_ids:
          type: array
          items: { type: string }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        viewed_at:
          type: string
          format: date-time
          nullable: true
          description: "Preenchido quando o personal/admin visualiza este check-in concluído"
        pse:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
          description: >-
            Percepção Subjetiva de Esforço (escala de Borg CR-10 simplificada, 1 a 10).
            `null` até ser registrada. Só pode ser definida quando o check-in já está
            concluído; a captura acontece uma vez, no momento da conclusão do treino.
        feedbacks:
          type: array
          items: { $ref: "#/components/schemas/Feedback" }
        reactions:
          type: array
          items: { $ref: "#/components/schemas/WorkoutReaction" }

    Feedback:
      type: object
      properties:
        id: { type: string }
        workout_check_in_id: { type: string }
        message: { type: string }
        author_name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    WorkoutReaction:
      type: object
      properties:
        id: { type: string }
        emoji: { type: string }
        author_name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    ScheduleSessionStatus:
      type: string
      enum: [planned, done, missed, canceled]

    ScheduleSession:
      type: object
      properties:
        id: { type: string }
        student_id: { type: string }
        student_name: { type: string }
        trainer_id: { type: string }
        trainer_name: { type: string, nullable: true }
        starts_at: { type: string, format: date-time }
        duration_minutes: { type: integer }
        status: { $ref: "#/components/schemas/ScheduleSessionStatus" }
        workout_id: { type: string, nullable: true }
        workout_check_in_id: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        plan_id:
          type: string
          nullable: true
          description: Presente quando a sessão foi gerada por um SchedulePlan (ausente numa sessão avulsa)

    WeekdaySlot:
      type: object
      required: [weekday, time, duration_minutes]
      properties:
        weekday:
          type: integer
          minimum: 0
          maximum: 6
          description: 0 = domingo .. 6 = sábado
        time:
          type: string
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          description: "Horário local (America/Sao_Paulo), formato HH:mm"
        duration_minutes: { type: integer, minimum: 15, maximum: 240 }

    SchedulePlanInput:
      type: object
      required: [student_id, weekdays, starts_on, ends_on]
      properties:
        student_id: { type: string }
        weekdays:
          type: array
          items: { $ref: "#/components/schemas/WeekdaySlot" }
        starts_on: { type: string, format: date }
        ends_on:
          type: string
          format: date
          description: Inclusive; o intervalo não pode ultrapassar 366 dias
        notes: { type: string, nullable: true, maxLength: 500 }

    Exam:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        file_url:
          type: string
          format: uri
          description: >-
            URL assinada de curta duração para uploads no bucket S3 (expira
            — ver S3_GET_PRESIGN_EXPIRY); busque o recurso de novo para
            renovar.
        content_type: { type: string, nullable: true }
        size: { type: integer, nullable: true, description: "bytes" }
        uploaded_at: { type: string, format: date-time }

    ExamInput:
      type: object
      required: [name, file_url]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        file_url: { type: string, format: uri }
        content_type: { type: string, nullable: true }
        size: { type: integer, nullable: true }
        uploaded_at:
          type: string
          format: date-time
          description: "Opcional; padrão é o momento do registro"

    Partner:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        logo_url: { type: string, format: uri, nullable: true }
        category: { type: string, description: "Texto livre definido pelo admin ao cadastrar o parceiro" }
        description: { type: string, nullable: true }
        discount_details: { type: string, nullable: true }
        coupon: { type: string, nullable: true }
        link: { type: string, format: uri, nullable: true }
        created_at: { type: string, format: date }

    PartnerInput:
      type: object
      required: [name, category]
      properties:
        name: { type: string }
        logo_url: { type: string, format: uri, nullable: true }
        category: { type: string, description: "Texto livre definido pelo admin ao cadastrar o parceiro" }
        description: { type: string, nullable: true }
        discount_details: { type: string, nullable: true }
        coupon: { type: string, nullable: true }
        link: { type: string, format: uri, nullable: true }

    PushSubscription:
      type: object
      properties:
        id: { type: string }
        endpoint: { type: string, format: uri }
        created_at: { type: string, format: date-time }

    PushSubscriptionInput:
      type: object
      required: [endpoint, keys]
      properties:
        endpoint: { type: string, format: uri }
        keys:
          type: object
          required: [p256dh, auth]
          properties:
            p256dh: { type: string }
            auth: { type: string }

    ChatMessage:
      type: object
      properties:
        id: { type: string }
        student_id: { type: string }
        sender_role: { type: string, enum: [personal, aluno] }
        sender_id: { type: string }
        sender_name: { type: string }
        body: { type: string }
        created_at: { type: string, format: date-time }
        read_at: { type: string, format: date-time, nullable: true }

    ChatConversation:
      type: object
      properties:
        student_id: { type: string }
        student_name: { type: string }
        student_avatar_url: { type: string, format: uri, nullable: true }
        trainer_id: { type: string }
        trainer_name: { type: string }
        last_message:
          type: object
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/ChatMessage" }
        unread_count: { type: integer }
        updated_at: { type: string, format: date-time }

    DashboardKpiCard:
      type: object
      properties:
        label: { type: string }
        value: { type: integer }
        icon: { type: string }
        delta: { type: number, description: "Variação percentual vs. período anterior de mesma duração" }

    DashboardActivityPoint:
      type: object
      properties:
        label: { type: string, format: date }
        workouts: { type: integer }
        assessments: { type: integer }

    AttendanceSummary:
      type: object
      properties:
        total_check_ins: { type: integer }
        completed_check_ins: { type: integer }
        students_with_check_in: { type: integer }
        active_students: { type: integer }
